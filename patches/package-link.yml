Change:
  PackageLink:
    PackageId:
      Serialization:
        Type: SerializesAs
        As: PackageIdSerialize
    PackageIdSerialize:
      AliasFor: PackageId
    SerializedDefaultAttributes:
      Scriptability: None

    PackageContent:
      Serialization:
        Type: SerializesAs
        As: PackageContentSerialize
    PackageContentSerialize:
      AliasFor: PackageContent
    PackageId:
      Serialization:
        Type: Migrate
        To: PackageContent
        Migration: ContentIdToContent